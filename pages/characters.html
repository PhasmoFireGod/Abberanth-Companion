<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Characters — Abberanth Companion</title>
  <link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-logo">
      <span class="logo-title">Abberanth</span>
      <span class="logo-subtitle">Companion</span>
    </div>
    <nav>
      <span class="nav-section-label">Home</span>
      <a href="../index.html"><span class="nav-icon">🏰</span> Dashboard</a>
      <span class="nav-section-label">Lore</span>
      <a href="timelines.html"><span class="nav-icon">📜</span> Timelines</a>
      <a href="npcs.html"><span class="nav-icon">🧙</span> NPCs</a>
      <span class="nav-section-label">Combat</span>
      <a href="monsters.html"><span class="nav-icon">🐉</span> Monsters</a>
      <span class="nav-section-label">Characters</span>
      <a href="characters.html"><span class="nav-icon">⚔️</span> Player Characters</a>
      <a href="character-sheet.html"><span class="nav-icon">📋</span> Character Sheet</a>
    </nav>
    <button id="dice-trigger">🎲 Roll Dice</button>
    <div id="sidebar-footer">
      <span id="sidebar-user-email"></span>
      <button id="logout-btn">Sign Out</button>
    </div>
  </aside>

  <main id="main">
    <header class="page-header">
      <h1 id="page-title">⚔️ Player Characters</h1>
      <p class="page-subtitle" id="page-subtitle">Loading…</p>
    </header>

    <div id="player-list" class="card-grid"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/dice.js"></script>
  <script src="../js/dice-ui.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function timeAgo(ts) {
      if (!ts) return 'Never';
      const diff = Date.now() - (ts.toMillis ? ts.toMillis() : ts);
      const m = Math.floor(diff / 60000);
      if (m < 1)  return 'Just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    window.onAuthReady(async (user) => {
      const listEl     = document.getElementById('player-list');
      const subtitleEl = document.getElementById('page-subtitle');

      if (window.isDM) {
        /* ---- DM view: show all players ---- */
        subtitleEl.textContent = '🎭 DM view — all registered players';

        try {
          const snap    = await window._db.collection('players').get();
          const dmEmails = (SITE_CONFIG.dmEmails || []).map(e => e.toLowerCase());
          const players  = [];

          snap.forEach(doc => {
            const d = doc.data();
            if (!dmEmails.includes((d.email || '').toLowerCase())) {
              players.push(d);
            }
          });

          if (players.length === 0) {
            listEl.innerHTML = '<p class="text-muted" style="font-size:0.9rem;">No players have logged in yet.</p>';
            return;
          }

          players.forEach(p => {
            // Use saved character name if available, fall back to email
            const displayName = p.charName || '(No character saved)';
            const subLine     = p.charName
              ? [p.race, p.level != null ? `Level ${p.level}` : ''].filter(Boolean).join(' · ')
              : p.email;

            const card = document.createElement('a');
            card.className = 'card';
            card.href      = `character-sheet.html?uid=${p.uid}`;
            card.innerHTML = `
              <div class="card-icon">${p.charName ? '⚔️' : '👤'}</div>
              <h3>${displayName}</h3>
              <p style="font-size:0.78rem; color:var(--text-muted);">${subLine}</p>
              <p>Last seen: ${timeAgo(p.lastSeen)}</p>
              <div class="card-meta">
                <span class="badge badge-purple">Player</span>
                <span style="margin-left:auto; font-size:0.7rem; color:var(--text-muted);">Open Sheet →</span>
              </div>
            `;
            listEl.appendChild(card);
          });

        } catch (e) {
          listEl.innerHTML = `<p class="text-muted">Could not load players: ${e.message}</p>`;
        }

      } else {
        /* ---- Player view: load their sheet and show a real card ---- */
        subtitleEl.textContent = 'Your character for Abberanth.';

        let charName = '';
        let race     = '';
        let level    = 0;
        let hasSaved = false;

        try {
          const snap = await window._db
            .collection('users').doc(user.uid)
            .collection('sheets').doc('main')
            .get();

          if (snap.exists) {
            const data = snap.data();
            charName = data.charName || '';
            race     = data.race     || '';
            level    = data.level    || 0;
            hasSaved = true;
          }
        } catch (e) {
          console.warn('Could not load sheet for card:', e);
        }

        const displayName = charName || 'Unnamed Character';
        const subLine     = [race, `Level ${level}`].filter(Boolean).join(' · ');
        const hint        = hasSaved
          ? 'Open to roll dice, edit stats, and track combat.'
          : 'Head to the Character Sheet to build your character, then hit Save.';

        listEl.innerHTML = `
          <a class="card" href="character-sheet.html">
            <div class="card-icon">${hasSaved && charName ? '⚔️' : '📋'}</div>
            <h3>${displayName}</h3>
            <p style="font-size:0.78rem; color:var(--text-muted); margin-bottom:0.25rem;">${subLine}</p>
            <p>${hint}</p>
            <div class="card-meta">
              <span class="badge badge-purple">Character</span>
              <span style="margin-left:auto; font-size:0.7rem; color:var(--text-muted);">Open Sheet →</span>
            </div>
          </a>
        `;
      }
    });
  </script>
</body>
</html>
