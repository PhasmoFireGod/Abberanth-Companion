<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal — Abberanth Companion</title>
  <link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/timelines.css" />
  <link rel="stylesheet" href="../css/journal.css" />
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-logo">
      <span class="logo-title">Abberanth</span>
      <span class="logo-subtitle">Companion</span>
    </div>
    <nav>
      <span class="nav-section-label">Home</span>
      <a href="../index.html"><span class="nav-icon">🏰</span> Dashboard</a>
      <span class="nav-section-label">Lore</span>
      <a href="map.html"><span class="nav-icon">🗺️</span> Maps</a>
      <a href="timelines.html"><span class="nav-icon">📜</span> Timelines</a>
      <a href="npcs.html"><span class="nav-icon">🧙</span> NPCs</a>
      <span class="nav-section-label">Combat</span>
      <a href="monsters.html"><span class="nav-icon">🐉</span> Monsters</a>
      <span class="nav-section-label">Characters</span>
      <a href="characters.html"><span class="nav-icon">⚔️</span> Player Characters</a>
      <a href="character-sheet.html"><span class="nav-icon">📋</span> Character Sheet</a>
      <span class="nav-section-label">Party</span>
      <a href="journal.html"><span class="nav-icon">📔</span> Journal</a>
      <a href="playlist.html"><span class="nav-icon">🎵</span> Sessions</a>
    </nav>
    <button id="dice-trigger">🎲 Roll Dice</button>
    <div id="sidebar-footer">
      <span id="sidebar-user-email"></span>
      <button id="logout-btn">Sign Out</button>
    </div>
  </aside>

  <main id="main">
    <header class="page-header" style="margin-bottom:1rem;">
      <h1>📔 Journal</h1>
    </header>

    <!-- Timeline filter -->
    <div class="tl-filter-bar" id="journal-timeline-filter"></div>

    <!-- Tabs -->
    <div class="journal-tabs">
      <button class="journal-tab active" id="tab-personal">📔 My Journal</button>
      <button class="journal-tab"        id="tab-group">👥 Group Journal</button>
    </div>

    <!-- Two-panel layout -->
    <div class="journal-layout">

      <!-- Entry list -->
      <div class="journal-list-panel">
        <div class="journal-list-header">
          <span style="font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Entries</span>
          <button class="journal-new-btn" id="journal-new-btn">+ New</button>
        </div>
        <div class="journal-list" id="journal-list"></div>
      </div>

      <!-- Editor -->
      <div class="journal-editor-panel">
        <!-- Shown when an entry is selected -->
        <div id="journal-editor-wrap" style="display:none;flex-direction:column;height:100%;">
          <div class="journal-editor-header">
            <input
              type="text"
              id="journal-title"
              class="journal-title-input"
              placeholder="Entry title…"
            />
          </div>
          <div id="journal-author-tag" class="journal-author-tag" style="display:none;"></div>
          <textarea
            id="journal-content"
            class="journal-content-input"
            placeholder="Write your entry here…"
          ></textarea>
          <div class="journal-editor-footer">
            <button class="journal-delete-btn" id="journal-delete-btn">Delete</button>
            <span class="journal-save-status" id="journal-save-status"></span>
          </div>
        </div>
        <!-- Shown when no entry is selected -->
        <div id="journal-no-entry" class="journal-no-entry">
          Select an entry or click <strong style="color:var(--accent-gold);">+ New</strong> to start writing.
        </div>
      </div>

    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/dice.js"></script>
  <script src="../js/dice-ui.js"></script>
  <script src="../js/journal.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
